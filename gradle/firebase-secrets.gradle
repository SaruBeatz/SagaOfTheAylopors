// Generates app/google-services.json from secrets/.env and secrets/secrets.properties (gitignored).
ext.generateGoogleServicesJson = { File appProjectDir ->
    def rootDir = appProjectDir.parentFile
    def secretsDir = new File(rootDir, 'secrets')
    def result = [:]

    def envFile = new File(secretsDir, '.env')
    if (envFile.exists()) {
        envFile.eachLine('UTF-8') { line ->
            def trimmed = line.trim()
            if (trimmed.isEmpty() || trimmed.startsWith('#')) {
                return
            }
            def eq = trimmed.indexOf('=')
            if (eq > 0) {
                result[trimmed.substring(0, eq).trim()] = trimmed.substring(eq + 1).trim()
            }
        }
    }

    def propsFile = new File(secretsDir, 'secrets.properties')
    if (propsFile.exists()) {
        def props = new Properties()
        propsFile.withInputStream { props.load(it) }
        props.each { key, value ->
            def k = key.toString()
            def v = value.toString().trim()
            if (!v.isEmpty() && !v.startsWith('#')) {
                result[k] = v
            }
        }
    }

    if (result.isEmpty()) {
        throw new GradleException(
                'No secrets found. Create secrets/.env and/or secrets/secrets.properties with Firebase values.')
    }

    def requiredKeys = [
            'FIREBASE_API_KEY',
            'FIREBASE_PROJECT_NUMBER',
            'FIREBASE_PROJECT_ID',
            'FIREBASE_STORAGE_BUCKET',
            'FIREBASE_MOBILE_SDK_APP_ID',
            'ANDROID_APPLICATION_ID'
    ]
    requiredKeys.each { key ->
        if (!result[key]) {
            throw new GradleException("Missing ${key} in secrets/.env or secrets/secrets.properties")
        }
    }

    def json = """{
  "project_info": {
    "project_number": "${result['FIREBASE_PROJECT_NUMBER']}",
    "project_id": "${result['FIREBASE_PROJECT_ID']}",
    "storage_bucket": "${result['FIREBASE_STORAGE_BUCKET']}"
  },
  "client": [
    {
      "client_info": {
        "mobilesdk_app_id": "${result['FIREBASE_MOBILE_SDK_APP_ID']}",
        "android_client_info": {
          "package_name": "${result['ANDROID_APPLICATION_ID']}"
        }
      },
      "oauth_client": [],
      "api_key": [
        {
          "current_key": "${result['FIREBASE_API_KEY']}"
        }
      ],
      "services": {
        "appinvite_service": {
          "other_platform_oauth_client": []
        }
      }
    }
  ],
  "configuration_version": "1"
}
"""
    new File(appProjectDir, 'google-services.json').write(json, 'UTF-8')
}
